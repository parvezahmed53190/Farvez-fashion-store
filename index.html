<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farvez Fashion Store | Luxury Fashion</title>
    <style>
      #loader-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.8s ease, visibility 0.8s ease;
      }

      .loader-content {
        text-align: center;
        max-width: 400px;
        width: 90%;
      }

      .logo-animation {
        width: 100px;
        height: 100px;
        margin: 0 auto 24px;
        background: #000000;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        animation: pulse 2s infinite ease-in-out;
      }

      .logo-text {
        color: #d4af37; /* Gold */
        font-family: 'Playfair Display', serif;
        font-size: 40px;
        font-weight: 900;
        letter-spacing: -2px;
      }

      .store-name {
        font-family: 'Inter', sans-serif;
        font-size: 24px;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 8px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .tagline {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        color: #888;
        margin-bottom: 32px;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      .progress-bar {
        width: 100%;
        height: 2px;
        background: #f0f0f0;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 16px;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: #d4af37;
        animation: progress 2.5s ease-in-out forwards;
      }

      .loading-text {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        color: #666;
        font-style: italic;
      }

      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.2); }
        70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 0, 0, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 0, 0, 0); }
      }

      @keyframes progress {
        0% { width: 0%; }
        50% { width: 70%; }
        100% { width: 100%; }
      }

      #loader-container.fade-out {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="loader-container">
      <div class="loader-content">
        <div class="logo-animation">
          <span class="logo-text">FF</span>
        </div>
        <h1 class="store-name">Farvez Fashion Store</h1>
        <p class="tagline">Style • Quality • Trust</p>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <p class="loading-text">Welcome to Farvez Fashion Store – Loading your fashion experience...</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function() {
        const loader = document.getElementById('loader-container');
        // Add a small delay for smooth transition
        setTimeout(() => {
          loader.classList.add('fade-out');
        }, 1500);
      });
    </script>
  </body>
</html>
